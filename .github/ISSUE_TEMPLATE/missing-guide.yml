name: Missing Guide
description: Suggest a missing task, guide, or troubleshooting page.
title: "[Docs Gap]: "
labels:
  - docs
  - enhancement
body:
  - type: textarea
    id: task
    attributes:
      label: Missing task or topic
      description: What do users need help doing?
      placeholder: Connect a Node project to Glubean Cloud
    validations:
      required: true
  - type: textarea
    id: current_workaround
    attributes:
      label: Current workaround
      description: How do people solve this today, if at all?
    validations:
      required: false
  - type: textarea
    id: proposed_location
    attributes:
      label: Where should it live?
      description: Suggest the closest existing section or page.
      placeholder: /getting-started or /cloud
    validations:
      required: false
  - type: textarea
    id: user_signal
    attributes:
      label: What user signal prompted this?
      description: Link the request to user questions, support tickets, repeated confusion, or onboarding friction.
    validations:
      required: false
